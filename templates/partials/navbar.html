<nav class="navbar navbar-expand-lg bg-white border-bottom px-3 px-lg-4">
  <div class="container-fluid px-0">
    <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar" aria-label="Abrir navegación">
      <i class="bi bi-list"></i>
    </button>
    <div class="ms-2 ms-lg-0">
      <div class="fw-semibold">{{ page_title|default:"Dashboard" }}</div>
      <div class="small text-secondary">Base operativa inicial</div>
    </div>
    <div class="ms-auto d-flex align-items-center gap-2">
      {% if request.user.is_authenticated %}
        <span class="small text-secondary d-none d-md-inline">{{ request.user.email }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="btn btn-sm btn-outline-secondary" type="submit" title="Cerrar sesión">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </form>
      {% else %}
        <a class="btn btn-sm btn-primary" href="{% url 'login' %}">
          <i class="bi bi-box-arrow-in-right me-1"></i>
          Ingresar
        </a>
      {% endif %}
    </div>
  </div>
</nav>
