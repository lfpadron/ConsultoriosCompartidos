<aside class="app-sidebar d-none d-lg-flex flex-column p-3 text-white">
  <a class="d-flex align-items-center gap-2 text-white text-decoration-none mb-4" href="{% url 'dashboard' %}">
    <span class="brand-mark">CC</span>
    <span>
      <span class="d-block fw-semibold">Consultorios</span>
      <span class="d-block small text-white-50">Compartidos</span>
    </span>
  </a>
  <nav class="nav nav-pills flex-column gap-1">
    {% for item in navigation_items %}
      <a class="nav-link d-flex align-items-center gap-2" href="{% url item.url_name %}">
        <i class="bi {{ item.icon }}"></i>
        <span>{{ item.label }}</span>
      </a>
    {% endfor %}
  </nav>
</aside>

<div class="offcanvas offcanvas-start app-sidebar text-white" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="mobileSidebarLabel">Consultorios Compartidos</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
  </div>
  <div class="offcanvas-body">
    <nav class="nav nav-pills flex-column gap-1">
      {% for item in navigation_items %}
        <a class="nav-link d-flex align-items-center gap-2" href="{% url item.url_name %}">
          <i class="bi {{ item.icon }}"></i>
          <span>{{ item.label }}</span>
        </a>
      {% endfor %}
    </nav>
  </div>
</div>
