{% extends "base.html" %}

{% block content %}
  <section id="finance-content" class="status-panel p-3 p-lg-4" hx-boost="true" hx-target="#finance-content" hx-select="#finance-content" hx-swap="outerHTML" hx-push-url="true">
    <div class="mb-4">
      <p class="text-uppercase text-secondary small fw-semibold mb-2">Validación financiera</p>
      <h1 class="h4 mb-2">{{ page_title }}</h1>
      <p class="text-secondary mb-0">{{ payment }}</p>
    </div>

    <div class="alert alert-warning" role="alert">
      ¿Deseas validar este pago por <strong>{{ payment.amount }} {{ payment.currency }}</strong>?
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'payment_detail' payment.pk %}">
          <i class="bi bi-arrow-left me-1"></i>
          Cancelar
        </a>
        <button class="btn btn-primary" type="submit">
          <i class="bi bi-check2-circle me-1"></i>
          Validar
        </button>
      </div>
    </form>
  </section>
{% endblock %}
