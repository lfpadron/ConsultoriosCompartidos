{% extends "base.html" %}

{% block content %}
  <section id="finance-content" class="status-panel p-3 p-lg-4" hx-boost="true" hx-target="#finance-content" hx-select="#finance-content" hx-swap="outerHTML" hx-push-url="true">
    <div class="mb-4">
      <p class="text-uppercase text-secondary small fw-semibold mb-2">Rechazo financiero</p>
      <h1 class="h4 mb-2">{{ page_title }}</h1>
      <p class="text-secondary mb-0">{{ payment }}</p>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="alert alert-danger" role="alert">{{ form.non_field_errors }}</div>
      {% endif %}

      <label class="form-label" for="{{ form.reason.id_for_label }}">{{ form.reason.label }}</label>
      {{ form.reason }}
      {% for error in form.reason.errors %}
        <div class="invalid-feedback d-block">{{ error }}</div>
      {% endfor %}

      <div class="d-flex justify-content-end gap-2 mt-4">
        <a class="btn btn-outline-secondary" href="{% url 'payment_detail' payment.pk %}">
          <i class="bi bi-arrow-left me-1"></i>
          Cancelar
        </a>
        <button class="btn btn-warning" type="submit">
          <i class="bi bi-x-octagon me-1"></i>
          Rechazar
        </button>
      </div>
    </form>
  </section>
{% endblock %}
