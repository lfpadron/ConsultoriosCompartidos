{% extends "base.html" %}

{% block content %}
  <section id="vault-content" class="status-panel p-3 p-lg-4" hx-boost="true" hx-target="#vault-content" hx-select="#vault-content" hx-swap="outerHTML" hx-push-url="true">
    <div class="mb-4">
      <p class="text-uppercase text-secondary small fw-semibold mb-2">Aprobación documental</p>
      <h1 class="h4 mb-2">{{ page_title }}</h1>
      <p class="text-secondary mb-0">{{ document }}</p>
    </div>

    <div class="alert alert-warning" role="alert">¿Deseas aprobar este documento?</div>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'document_detail' document.pk %}">
          <i class="bi bi-arrow-left me-1"></i>
          Volver
        </a>
        <button class="btn btn-success" type="submit">
          <i class="bi bi-check2-circle me-1"></i>
          Aprobar
        </button>
      </div>
    </form>
  </section>
{% endblock %}
