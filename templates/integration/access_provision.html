{% extends "base.html" %}

{% block content %}
  <section id="integration-content" class="status-panel p-3 p-lg-4" hx-boost="true" hx-target="#integration-content" hx-select="#integration-content" hx-swap="outerHTML" hx-push-url="true">
    <p class="text-uppercase text-secondary small fw-semibold mb-2">Acceso simulado</p>
    <h1 class="h4 mb-3">Habilitar acceso simulado</h1>
    <p class="text-secondary">Se generará una credencial simulada para la reservación:</p>
    <p class="fw-semibold">{{ reservation }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-primary" type="submit">
          <i class="bi bi-key me-1"></i>
          Habilitar acceso
        </button>
        <a class="btn btn-outline-secondary" href="{% url 'reservation_detail' reservation.pk %}">
          Cancelar
        </a>
      </div>
    </form>
  </section>
{% endblock %}
