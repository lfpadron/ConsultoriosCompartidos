{% extends "base.html" %}

{% block content %}
  <section id="integration-content" class="status-panel p-3 p-lg-4" hx-boost="true" hx-target="#integration-content" hx-select="#integration-content" hx-swap="outerHTML" hx-push-url="true">
    <p class="text-uppercase text-secondary small fw-semibold mb-2">Acceso simulado</p>
    <h1 class="h4 mb-3">Simular uso</h1>
    <p class="text-secondary">Se marcará la credencial como usada si está dentro de su ventana de validez.</p>
    <p class="fw-semibold"><code>{{ credential.simulated_code }}</code></p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-primary" type="submit">
          <i class="bi bi-door-open me-1"></i>
          Simular uso
        </button>
        <a class="btn btn-outline-secondary" href="{% url 'access_credential_detail' credential.pk %}">
          Cancelar
        </a>
      </div>
    </form>
  </section>
{% endblock %}
