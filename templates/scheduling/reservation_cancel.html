{% extends "base.html" %}

{% block content %}
  <section id="reservation-content" class="status-panel p-3 p-lg-4">
    <div class="mb-4">
      <p class="text-uppercase text-secondary small fw-semibold mb-2">Cancelación</p>
      <h1 class="h4 mb-2">Cancelar reservación</h1>
      <p class="text-secondary mb-0">{{ reservation }}</p>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="mb-3">
        <label class="form-label" for="{{ form.reason.id_for_label }}">{{ form.reason.label }}</label>
        {{ form.reason }}
        {% for error in form.reason.errors %}
          <div class="invalid-feedback d-block">{{ error }}</div>
        {% endfor %}
      </div>
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'reservation_detail' reservation.pk %}">
          <i class="bi bi-arrow-left me-1"></i>
          Volver
        </a>
        <button class="btn btn-danger" type="submit">
          <i class="bi bi-x-circle me-1"></i>
          Cancelar reservación
        </button>
      </div>
    </form>
  </section>
{% endblock %}
