{% extends "base.html" %}

{% block content %}
  <section id="reservation-content" class="status-panel p-3 p-lg-4">
    <div class="mb-4">
      <p class="text-uppercase text-secondary small fw-semibold mb-2">Confirmación</p>
      <h1 class="h4 mb-2">Confirmar reservación</h1>
      <p class="text-secondary mb-0">{{ reservation }}</p>
    </div>

    <div class="alert alert-info" role="alert">
      La reservación pasará a estado confirmada.
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'reservation_detail' reservation.pk %}">
          <i class="bi bi-arrow-left me-1"></i>
          Volver
        </a>
        <button class="btn btn-primary" type="submit">
          <i class="bi bi-check2-circle me-1"></i>
          Confirmar
        </button>
      </div>
    </form>
  </section>
{% endblock %}
