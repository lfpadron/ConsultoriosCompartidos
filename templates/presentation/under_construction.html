{% extends "base.html" %}

{% block content %}
  <section class="status-panel p-4">
    <div class="row align-items-center g-4">
      <div class="col-lg-8">
        <p class="text-uppercase text-secondary small fw-semibold mb-2">En construcción</p>
        <h1 class="h3 mb-2">{{ page_title }}</h1>
        <p class="text-secondary mb-0">
          La sección ya forma parte de la arquitectura de navegación. Su lógica de negocio
          se implementará cuando el dominio correspondiente avance a la siguiente iteración.
        </p>
      </div>
      <div class="col-lg-4">
        <a class="btn btn-outline-secondary w-100" href="{% url 'dashboard' %}">
          <i class="bi bi-arrow-left me-1"></i>
          Volver al dashboard
        </a>
      </div>
    </div>
  </section>
{% endblock %}
