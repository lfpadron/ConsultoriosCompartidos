repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: black
        name: black
        entry: uv run black --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
